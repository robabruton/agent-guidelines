name: verification

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Action pins identify reviewed release commits. To update a pin, verify the
# upstream release tag and commit, change the full SHA and version comment
# together, and run both jobs.
jobs:
  linux:
    name: Linux verification
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install and report ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck --version

      - name: Lint every tracked shell script
        run: |
          shell_files=()
          while IFS= read -r file; do
            shell_files+=("$file")
          done < <(git ls-files '*.sh')
          shellcheck -S warning "${shell_files[@]}"

      - name: Validate rule frontmatter
        run: |
          fail=0
          for file in rules/*.md; do
            if [ "$(basename "$file")" = README.md ]; then
              continue
            fi
            if [ "$(head -1 "$file")" != "---" ]; then
              echo "missing frontmatter delimiter: $file"
              fail=1
            fi
            if ! head -10 "$file" | grep -Eq '^when:[[:space:]]+.+'; then
              echo "missing or empty when field: $file"
              fail=1
            fi
            if ! head -10 "$file" |
              grep -Eq '^load:[[:space:]]+(always|recall)$'; then
              echo "missing or invalid load field: $file"
              fail=1
            fi
          done
          test "$fail" -eq 0

      - name: Verify generated policy assets
        run: |
          bash scripts/generate-rules-readme.sh --check
          bash scripts/generate-hook-policy.sh --check

      - name: Validate skill contracts
        run: bash scripts/validate-skills.sh

      - name: Validate Markdown links
        run: bash scripts/check-markdown-links.sh

      # The always-tier rule bodies load into every conversation's
      # context; growth here must be a deliberate, reviewed decision.
      # Raise the budget in the same change that justifies the growth.
      - name: Enforce always-tier context budget
        run: |
          budget=3300
          total=0
          for file in rules/*.md; do
            grep -q '^load: always$' "$file" || continue
            words=$(awk 'NR==1&&/^---[[:space:]]*$/{fm=1;next}
                         fm&&/^---[[:space:]]*$/{fm=0;next}
                         !fm{print}' "$file" | wc -w)
            echo "$file: $words words"
            total=$((total + words))
          done
          echo "always-tier body total: $total words (budget $budget)"
          test "$total" -le "$budget"

      - name: Verify referenced rules exist
        run: |
          eval "$(sed -n '/^MINIMAL_RULES=(/,/^)/p;
                         /^CODEBASE_EXTRA_RULES=(/,/^)/p;
                         /^RELEASED_EXTRA_RULES=(/,/^)/p;
                         /^CANONICAL_RULE_ORDER=(/,/^)/p' project-setup.sh)"
          fail=0
          for name in "${MINIMAL_RULES[@]}" \
                      "${CODEBASE_EXTRA_RULES[@]}" \
                      "${RELEASED_EXTRA_RULES[@]}" \
                      "${CANONICAL_RULE_ORDER[@]}"; do
            if [ ! -f "rules/${name}.md" ]; then
              echo "rule referenced by project-setup.sh but missing: ${name}"
              fail=1
            fi
          done
          test "$fail" -eq 0

      - name: Configure Git identity
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@example.invalid"

      - name: Run every test
        run: |
          for test_file in tests/*.sh; do
            echo "::group::$test_file"
            bash "$test_file"
            echo "::endgroup::"
          done

  macos:
    name: macOS portability smoke
    runs-on: macos-latest
    defaults:
      run:
        shell: /bin/bash -e {0}
    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Report platform tools
        run: |
          /bin/bash --version
          git --version

      - name: Check shell syntax with system Bash
        run: |
          while IFS= read -r file; do
            /bin/bash -n "$file"
          done < <(git ls-files '*.sh')

      - name: Configure Git identity
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@example.invalid"

      - name: Verify portable generators and validators
        run: |
          /bin/bash scripts/generate-rules-readme.sh --check
          /bin/bash scripts/generate-hook-policy.sh --check
          /bin/bash scripts/validate-skills.sh
          /bin/bash scripts/check-markdown-links.sh

      - name: Run portability smoke tests
        run: |
          smoke_tests=(
            tests/agent-memory-report-safety.sh
            tests/option-parsing-safety.sh
            tests/project-context-compatibility.sh
            tests/project-harness-compatibility.sh
            tests/project-setup-smoke.sh
            tests/rule-assembly-safety.sh
            tests/setup-smoke.sh
            tests/temp-cleanup-safety.sh
          )
          for test_file in "${smoke_tests[@]}"; do
            echo "::group::$test_file"
            /bin/bash "$test_file"
            echo "::endgroup::"
          done
