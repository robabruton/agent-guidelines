name: smoke

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint shell scripts (warning level and above)
        run: |
          shellcheck -S warning \
            setup.sh \
            project-setup.sh \
            lib/assemble-rules.sh \
            lib/safe-mutations.sh \
            tests/setup-smoke.sh \
            tests/project-setup-smoke.sh \
            tests/hooks-smoke.sh \
            tests/managed-block-safety.sh \
            tests/setup-backup-safety.sh \
            tests/project-source-safety.sh \
            tests/project-ownership-safety.sh \
            tests/project-removal-safety.sh \
            tests/project-state-safety.sh \
            tests/project-git-scope-safety.sh \
            tests/project-git-identity-safety.sh \
            tests/project-initial-commit-safety.sh \
            tests/project-git-recovery-safety.sh \
            tests/project-default-branch-safety.sh \
            scripts/generate-rules-readme.sh \
            skills/agent-memory/scripts/agent-memory-report.sh

      - name: Validate rule frontmatter
        run: |
          fail=0
          for f in rules/*.md; do
            if [ "$(basename "$f")" = README.md ]; then
              continue
            fi
            if [ "$(head -1 "$f")" != "---" ]; then
              echo "missing frontmatter delimiter: $f"
              fail=1
            fi
            if ! head -10 "$f" | grep -Eq '^when:[[:space:]]+.+'; then
              echo "missing or empty when field: $f"
              fail=1
            fi
            if ! head -10 "$f" | grep -Eq '^load:[[:space:]]+(always|recall)$'; then
              echo "missing or invalid load field: $f"
              fail=1
            fi
          done
          test "$fail" -eq 0

      - name: Verify rules README matches rule frontmatter
        run: bash scripts/generate-rules-readme.sh --check

      # The always-tier rule bodies load into every conversation's
      # context; growth here must be a deliberate, reviewed decision.
      # Raise the budget in the same change that justifies the growth.
      - name: Enforce always-tier context budget
        run: |
          budget=3300
          total=0
          for f in rules/*.md; do
            grep -q '^load: always$' "$f" || continue
            words=$(awk 'NR==1&&/^---[[:space:]]*$/{fm=1;next}
                         fm&&/^---[[:space:]]*$/{fm=0;next}
                         !fm{print}' "$f" | wc -w)
            echo "$f: $words words"
            total=$((total + words))
          done
          echo "always-tier body total: $total words (budget $budget)"
          test "$total" -le "$budget"

      - name: Verify rule and skill names referenced by scripts exist
        run: |
          eval "$(sed -n '/^MINIMAL_RULES=(/,/^)/p;
                         /^CODEBASE_EXTRA_RULES=(/,/^)/p;
                         /^RELEASED_EXTRA_RULES=(/,/^)/p;
                         /^CANONICAL_RULE_ORDER=(/,/^)/p' project-setup.sh)"
          eval "$(sed -n '/^GLOBAL_SKILLS=(/,/^)/p' setup.sh)"
          fail=0
          for name in "${MINIMAL_RULES[@]}" "${CODEBASE_EXTRA_RULES[@]}" \
                     "${RELEASED_EXTRA_RULES[@]}" "${CANONICAL_RULE_ORDER[@]}"; do
            if [ ! -f "rules/${name}.md" ]; then
              echo "rule referenced by project-setup.sh but missing: ${name}"
              fail=1
            fi
          done
          for name in "${GLOBAL_SKILLS[@]}"; do
            if [ ! -d "skills/${name}" ]; then
              echo "skill referenced by setup.sh but missing: ${name}"
              fail=1
            fi
          done
          test "$fail" -eq 0

      - name: Configure git identity (required by project-setup.sh)
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@example.invalid"

      - name: Run setup-smoke
        run: bash tests/setup-smoke.sh

      - name: Run project-setup-smoke
        run: bash tests/project-setup-smoke.sh

      - name: Run managed-block-safety
        run: bash tests/managed-block-safety.sh

      - name: Run setup-backup-safety
        run: bash tests/setup-backup-safety.sh

      - name: Run project-source-safety
        run: bash tests/project-source-safety.sh

      - name: Run project-ownership-safety
        run: bash tests/project-ownership-safety.sh

      - name: Run project-removal-safety
        run: bash tests/project-removal-safety.sh

      - name: Run project-state-safety
        run: bash tests/project-state-safety.sh

      - name: Run project-git-scope-safety
        run: bash tests/project-git-scope-safety.sh

      - name: Run project-git-identity-safety
        run: bash tests/project-git-identity-safety.sh

      - name: Run project-initial-commit-safety
        run: bash tests/project-initial-commit-safety.sh

      - name: Run project-git-recovery-safety
        run: bash tests/project-git-recovery-safety.sh

      - name: Run project-default-branch-safety
        run: bash tests/project-default-branch-safety.sh

      # Ubuntu's /bin/sh is dash, so this run also proves the hook
      # snippets execute under a strict POSIX shell.
      - name: Run hooks-smoke
        run: bash tests/hooks-smoke.sh
